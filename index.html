<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismic Art: Radiant & Floating</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden; min-height: 100vh;
            background-color: #0c0b0d;
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url("./assets/a.png");
            background-size: cover; background-position: center; font-family: 'Inter', Arial, sans-serif;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg'); opacity: 0.04; pointer-events: none; z-index: 1;
        }
        #enter-btn {
            position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
            padding: 16px 40px; background: rgba(255, 255, 255, 0.03); color: #F5F2EB;
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50px; cursor: pointer;
            font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 100;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); outline: none;
        }
        #enter-btn:hover {
            background: rgba(255, 255, 255, 0.08); border-color: rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.35); color: #fff; transform: translateX(-50%) translateY(-3px) scale(1.02);
        }
        footer {
            position: absolute; bottom: 35px; width: 100%; text-align: center;
            color: rgba(245, 242, 235, 0.35); font-size: 10px; letter-spacing: 1.5px;
            line-height: 1.8; z-index: 50; pointer-events: none; text-transform: uppercase;
        }
        footer span { display: block; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
    </style>
</head>
<body>
    <button id="enter-btn">ENTER EXPERIENCE</button>
    <footer>
        <span>Built on Seismic.</span>
        <span>Privacy isn't a feature. It's the foundation.</span>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- CONSTANTS ---
        let shakeIntensity = 0;
        const SHAKE_DECAY = 0.90;
        const SPARK_THRESHOLD = 0.8;
        const sparks = [];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- BLOOM POST-PROCESSING ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.25; // 어느 밝기부터 빛날지
        bloomPass.strength = 0.4;    // 빛나는 강도 (은은하게)
        bloomPass.radius = 0.3;      // 빛 번짐 반경

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const light = new THREE.DirectionalLight(0xffffff, 2);
        light.position.set(20, 30, 25);
        scene.add(light);

        // --- SPARK SYSTEM ---
        const sparkGeo = new THREE.PlaneGeometry(0.3, 0.3);
        const sparkMat = new THREE.MeshBasicMaterial({ color: 0xFFD700, transparent: true, blending: THREE.AdditiveBlending });
        function createSparks(pos, count = 12) {
            for (let i = 0; i < count; i++) {
                const spark = new THREE.Mesh(sparkGeo, sparkMat.clone());
                spark.position.copy(pos);
                spark.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5, (Math.random()-0.5)*0.5), life: 1.0 };
                scene.add(spark);
                sparks.push(spark);
            }
        }

        // 배경 파티클
        const particlesMesh = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(800 * 3).map(() => (Math.random() - 0.5) * 200), 3)),
            new THREE.PointsMaterial({ size: 0.12, color: 0xF5F2EB, transparent: true, opacity: 0.15 })
        );
        scene.add(particlesMesh);

        const letterMeshes = [];
        const chars = "SEISMIC".split("");
        const hexColors = [0xF5F2EB, 0xF2EFE7, 0xFFF8F0];
        let friction = 0.985, wallBounce = 0.75, isReturning = false;

        const loader = new FontLoader();
        loader.load('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            chars.forEach((char, i) => {
                const geometry = new TextGeometry(char, {
                    font: font, size: 7, height: 2, curveSegments: 12,
                    bevelEnabled: true, bevelThickness: 0.6, bevelSize: 0.3, bevelSegments: 5
                });
                geometry.center();
                const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ 
                    color: hexColors[i % hexColors.length], 
                    metalness: 0.7, 
                    roughness: 0.15,
                    emissive: hexColors[i % hexColors.length],
                    emissiveIntensity: 0.1 // 블룸 효과를 위한 미세한 발광
                }));
                const startX = -30 + (i * 10);
                mesh.position.set(startX, 0, 0);
                mesh.userData = { velocity: new THREE.Vector3(), initialPos: new THREE.Vector3(startX, 0, 0), radius: 4.5, isDragging: false, floatOffset: Math.random() * Math.PI * 2 };
                scene.add(mesh);
                letterMeshes.push(mesh);
            });
        });

        let mouse = new THREE.Vector2(), raycaster = new THREE.Raycaster(), draggedObject = null;

        window.addEventListener('mousedown', (e) => {
            isReturning = false;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(letterMeshes);
            if (intersects.length > 0) draggedObject = intersects[0].object; draggedObject.userData.isDragging = true;
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            if (draggedObject) {
                const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
                const dir = vector.sub(camera.position).normalize();
                const dist = -camera.position.z / dir.z;
                const pos = camera.position.clone().add(dir.multiplyScalar(dist));
                draggedObject.userData.velocity.subVectors(pos, draggedObject.position).multiplyScalar(0.4);
                draggedObject.position.copy(pos);
            }
        });

        window.addEventListener('mouseup', () => { if (draggedObject) { draggedObject.userData.isDragging = false; draggedObject = null; } });
        document.getElementById('enter-btn').addEventListener('click', () => { isReturning = true; });

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.001;

            // 카메라 쉐이크
            if (shakeIntensity > 0.01) {
                const t = Date.now() * 0.04;
                camera.position.x = Math.sin(t) * shakeIntensity;
                camera.position.y = Math.cos(t * 0.8) * shakeIntensity;
                shakeIntensity *= SHAKE_DECAY;
            } else {
                camera.position.set(0, 0, 60);
                shakeIntensity = 0;
            }

            // 스파크 업데이트
            for (let i = sparks.length - 1; i >= 0; i--) {
                const s = sparks[i];
                s.position.add(s.userData.velocity);
                s.userData.life -= 0.05;
                s.material.opacity = s.userData.life;
                s.scale.setScalar(s.userData.life);
                if (s.userData.life <= 0) { scene.remove(s); s.material.dispose(); sparks.splice(i, 1); }
            }

            particlesMesh.rotation.y += 0.0002;
            const edgeX = (window.innerWidth / 25) + 25;
            const edgeY = (window.innerHeight / 25) + 20;

            letterMeshes.forEach((meshA, i) => {
                const ud = meshA.userData;
                if (isReturning) {
                    meshA.position.lerp(ud.initialPos, 0.08);
                    meshA.rotation.x *= 0.9; meshA.rotation.y *= 0.9;
                    if(meshA.position.distanceTo(ud.initialPos) < 0.01) meshA.position.copy(ud.initialPos);
                } else if (!ud.isDragging) {
                    meshA.position.add(ud.velocity);
                    ud.velocity.multiplyScalar(friction);

                    // --- AMBIENT FLOATING (아주아주 천천히 떠다님) ---
                    if (ud.velocity.length() < 0.05) {
                        meshA.position.y += Math.sin(time * 0.8 + ud.floatOffset) * 0.008;
                    }

                    // 벽 충돌
                    if (Math.abs(meshA.position.x) > edgeX) {
                        if (Math.abs(ud.velocity.x) > SPARK_THRESHOLD) createSparks(meshA.position, 8);
                        meshA.position.x = Math.sign(meshA.position.x) * edgeX;
                        ud.velocity.x *= -wallBounce;
                    }
                    if (Math.abs(meshA.position.y) > edgeY) {
                        if (Math.abs(ud.velocity.y) > SPARK_THRESHOLD) createSparks(meshA.position, 8);
                        meshA.position.y = Math.sign(meshA.position.y) * edgeY;
                        ud.velocity.y *= -wallBounce;
                    }
                    meshA.rotation.x += ud.velocity.y * 0.05;
                    meshA.rotation.y += ud.velocity.x * 0.05;
                }

                // 글자 간 충돌
                if(!isReturning) {
                    for (let j = i + 1; j < letterMeshes.length; j++) {
                        const meshB = letterMeshes[j];
                        const diff = new THREE.Vector3().subVectors(meshA.position, meshB.position);
                        const dist = diff.length();
                        const minD = ud.radius + meshB.userData.radius;
                        if (dist < minD) {
                            const relVel = ud.velocity.distanceTo(meshB.userData.velocity);
                            if (relVel > 1.0) {
                                createSparks(new THREE.Vector3().addVectors(meshA.position, meshB.position).multiplyScalar(0.5), 12);
                                shakeIntensity = Math.min(shakeIntensity + relVel * 0.15, 0.6);
                            }
                            const normal = diff.normalize();
                            const force = normal.multiplyScalar((minD - dist) * 0.05);
                            if (!ud.isDragging) ud.velocity.add(force);
                            if (!meshB.userData.isDragging) meshB.userData.velocity.sub(force);
                        }
                    }
                }
            });
            composer.render(); // renderer.render 대신 composer.render 호출
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
